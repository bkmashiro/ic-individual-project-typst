name: Build PDF

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Typst
        uses: typst-community/setup-typst@v3

      - name: Compile PDF
        run: typst compile main.typ example.pdf --font-path fonts/

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: example-pdf
          path: example.pdf
